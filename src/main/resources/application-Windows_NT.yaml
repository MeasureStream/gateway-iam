spring:
  application:
    name: iam_module
  main:
    web-application-type: servlet

  cloud:
    gateway:
      mvc:
        http-client:
          type: AUTODETECT
        routes:
          # Sensor Manager Routes
          - id: sensor-manager-nodes
            uri: http://localhost:8082
            predicates:
              - Path=/API/nodes/**
            filters:
              - TokenRelay

          - id: sensor-manager-user
            uri: http://localhost:8082
            predicates:
              - Path=/API/user/**
            filters:
              - TokenRelay

          - id: sensor-manager-measurementunit
            uri: http://localhost:8082
            predicates:
              - Path=/API/measurementunits/**
            filters:
              - TokenRelay

          - id: sensor-manager-controlunits
            uri: http://localhost:8082
            predicates:
              - Path=/API/controlunits/**
            filters:
              - TokenRelay

          # Measure Manager Routes
          - id: measure-manager
            uri: http://localhost:8081
            predicates:
              - Path=/API/measures/**
            filters:
              - TokenRelay

          # DCC Service Routes
          - id: dcc-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/dcc/**
            filters:
              - TokenRelay

          - id: dcc-service-mus
            uri: http://localhost:8084
            predicates:
              - Path=/api/mus/**
            filters:
              - TokenRelay

          - id: dcc-service-public
            uri: http://localhost:8084
            predicates:
              - Path=/api/public/**

          # Gemimeg Backend Routes
          - id: gemimeg-backend
            uri: http://localhost:3007
            predicates:
              - Path=/API/gemimeg/**
            filters:
              - TokenRelay

          - id: gemimeg-backend-cache
            uri: http://localhost:3007
            predicates:
              - Path=/API/cache/**
            filters:
              - TokenRelay

          - id: gemimeg-backend-version
            uri: http://localhost:3007
            predicates:
              - Path=/API/version/**

          # Frontend Routes
          - id: frontend
            uri: http://localhost:5173
            predicates:
              - Path=/ui/**

          - id: gemimeg-frontend
            uri: http://localhost:3006
            predicates:
              - Path=/gemimeg/**

          - id: home
            uri: http://localhost:8080
            predicates:
              - Path=/
            filters:
              - RedirectTo=301,http://localhost:8080/ui

        form-filter:
          enabled: false

  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:8090/realms/measurestream
        registration:
          gateway:
            provider: keycloak
            client-id: gateway
            client-secret: ${KEYCLOAK_GATEWAY_CLIENT_SECRET}
            scope:
              - openid
              - offline_access
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/gateway

  servlet:
    multipart:
      enabled: true
      max-file-size: -1
      max-request-size: -1

server:
  max-http-request-header-size: 5MB
  port: 8080
